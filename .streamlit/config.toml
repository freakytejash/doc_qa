[theme]
# Light theme for better visibility of answers
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#31333F"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
# Allow wider layout
maxUploadSize = 200

[ui]
# Better button styling
hideTopBar = false
